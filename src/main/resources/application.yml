spring:
  data:
    web:
      pageable:
        max-page-size: 100
  datasource:
    url: jdbc:postgresql://localhost:5432/transactions_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect